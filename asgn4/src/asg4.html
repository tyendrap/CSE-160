<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 3: Creating a Virtual World</title>
  </head>

  <body onload="main()">
    <p>Name: Tarun Yendrapati</p>
    <p>Email: tyendrap@ucsc.edu</p>

    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>
 
    <p id="fps"></p>

    <p>
    Normal:
    <button type="button" id="normalOnButton">ON</button>
    <button type="button" id="normalOffButton">OFF</button>

    <p>
    Light:
    <button type="button" id="lightOnButton">ON</button>
    <button type="button" id="lightOffButton">OFF</button>

    <p>
    Light X <input type="range" min="-250" max="250" value="0" class="slider" id="lightSlideX">
    Light Y <input type="range" min="-250" max="250" value="0" class="slider" id="lightSlideY">
    Light Z <input type="range" min="-250" max="250" value="-200" class="slider" id="lightSlideZ">

    <p>
    Feet <input type="range" min="-45" max="0" value="0" class="slider" id="feetSlide">
    Animation:
    <button type="button" id="animationFeetOnButton">ON</button>
    <button type="button" id="animationFeetOffButton">OFF</button>

    <p>
    Calves <input type="range" min="-45" max="45" value="0" class="slider" id="magentaSlide">   
    Animation:
    <button type="button" id="animationMagentaOnButton">ON</button>
    <button type="button" id="animationMagentaOffButton">OFF</button>

    <p>
    Thighs <input type="range" min="-45" max="45" value="0" class="slider" id="yellowSlide">    
    Animation:
    <button type="button" id="animationYellowOnButton">ON</button>
    <button type="button" id="animationYellowOffButton">OFF</button>

    <p>
    Camera Angle <input type="range" min="-180" max="180" value="0" class="slider" id="angleSlide">

    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix.js"></script>
    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="Cube.js"></script>
    <script src="Sphere.js"></script>
    <script src="Cylinder.js"></script>
    <script src="Camera.js"></script>
    <script src="Model.js"></script>
    <script src="asg4.js"></script>
  </body>
</html>
